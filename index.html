<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharanraj Menthe | Cyber Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

    <div id="particles-js"></div>

    <nav class="navbar">
        <div class="logo">SR<span>.AI</span></div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#certs">Showcase</a>
        </div>
    </nav>

    <header id="home" class="hero">
        <div class="hero-main" data-aos="zoom-out">
            <div class="glitch-wrapper">
                <div class="profile-glow">
                    <img src="MYSelf.jpeg" alt="Sharanraj" class="main-avatar">
                </div>
                <h1 class="glitch" data-text="SHARANRAJ MENTHE">SHARANRAJ MENTHE</h1>
                <p class="tagline">DEVELOPER | AI RESEARCHER | MATLAB EXPERT</p>
                <div class="type-box"><span id="typed"></span></div>
            </div>
        </div>
    </header>

    <section id="certs" class="cert-section">
        <h2 class="section-title">ACHIEVEMENTS</h2>
        <div class="cert-container">
            
            <div class="glass-card" data-aos="fade-up">
                <div class="card-inner">
                    <img src="YUVA_AI_FOR_ALL.jpeg" alt="Yuva AI">
                    <div class="card-content">
                        <h3>YUVA AI FOR ALL</h3>
                        <span>NASSCOM</span>
                    </div>
                </div>
            </div>

            <div class="glass-card" data-aos="fade-up" data-aos-delay="100">
                <div class="card-inner">
                    <img src="Matlab.jpeg" alt="Matlab">
                    <div class="card-content">
                        <h3>MATLAB PROGRAMMING</h3>
                        <span>VANDERBILT UNIVERSITY</span>
                    </div>
                </div>
            </div>

            <div class="glass-card" data-aos="fade-up" data-aos-delay="200">
                <div class="card-inner">
                    <img src="Programming_for_everybody_python.jpeg" alt="Python">
                    <div class="card-content">
                        <h3>PYTHON FOR EVERYBODY</h3>
                        <span>U-MICHIGAN</span>
                    </div>
                </div>
            </div>

            <div class="glass-card" data-aos="fade-up" data-aos-delay="300">
                <div class="card-inner">
                    <img src="Cisco_ceritificate.jpg" alt="Cisco">
                    <div class="card-content">
                        <h3>MODERN AI</h3>
                        <span>CISCO ACADEMY</span>
                    </div>
                </div>
            </div>

            <div class="glass-card" data-aos="fade-up" data-aos-delay="400">
                <div class="card-inner">
                    <img src="ACE_CERITIFICATE.jpeg" alt="ACE">
                    <div class="card-content">
                        <h3>ACE CERTIFICATE</h3>
                        <span>MIT VPU</span>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <p>TERMINAL v2.0 // SHARANRAJ MENTHE // 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <script src="script.js"></script>
</body>
</html>
